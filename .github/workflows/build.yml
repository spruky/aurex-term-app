name: build-apk

# Builds the Aurex Term APK entirely in CI — no local gradle/antbuild needed.
# The Debian rootfs and native proot binaries are fetched here (NOT committed),
# dropped into the app's assets/jniLibs, then assembleRelease runs. Signing is
# optional: if the keystore secrets are present the release APK is signed,
# otherwise it falls back to debug signing (see app/build.gradle.kts).

on:
  push:
    branches: [master]
  workflow_dispatch:
    inputs:
      sign:
        description: "Sign the release APK with repo-secret keystore"
        type: boolean
        default: false

permissions:
  contents: read

env:
  # proot-distro Debian rootfs (per-arch tarballs). Pin to a release tag.
  PROOT_DISTRO_TAG: "v4.21.0"
  # Termux proot package mirror for the native binary + loader.
  TERMUX_MIRROR: "https://packages.termux.dev/apt/termux-main"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts', 'gradle/libs.versions.toml') }}
          restore-keys: gradle-${{ runner.os }}-

      # --- native proot payload (per ABI) -----------------------------------
      # proot + its libtalloc/loader land in jniLibs as lib*.so so the installer
      # extracts them and marks them executable. TermSession looks them up in
      # nativeLibraryDir at runtime.
      - name: Fetch proot native binaries
        run: |
          set -euo pipefail
          fetch_arch() {
            local abi="$1" deb_arch="$2"
            local dest="app/src/main/jniLibs/$abi"
            mkdir -p "$dest"
            echo "::group::proot for $abi ($deb_arch)"
            # Pull the proot .deb from the Termux mirror and unpack the binary.
            local idx="$TERMUX_MIRROR/dists/stable/main/binary-$deb_arch/Packages"
            local pkg
            pkg=$(curl -fsSL "$idx" | awk -v RS='' '/Package: proot\n/{print}' | grep '^Filename:' | head -1 | awk '{print $2}')
            curl -fsSL "$TERMUX_MIRROR/$pkg" -o proot.deb
            ar x proot.deb
            tar -xf data.tar.* ./data/data/com.termux/files/usr/bin/proot ./data/data/com.termux/files/usr/libexec/proot/loader 2>/dev/null || \
              tar -xf data.tar.*
            cp ./data/data/com.termux/files/usr/bin/proot "$dest/libproot.so"
            if [ -f ./data/data/com.termux/files/usr/libexec/proot/loader ]; then
              cp ./data/data/com.termux/files/usr/libexec/proot/loader "$dest/libloader.so"
            fi
            rm -rf data.tar.* control.tar.* debian-binary proot.deb data
            echo "::endgroup::"
          }
          fetch_arch arm64-v8a aarch64
          fetch_arch armeabi-v7a arm
          ls -R app/src/main/jniLibs

      # --- Debian rootfs (single small tarball; first-launch unpacks it) -----
      - name: Fetch Debian rootfs
        run: |
          set -euo pipefail
          dest="app/src/main/assets/bootstrap"
          mkdir -p "$dest"
          # Export the official Debian arm64 image as the proot rootfs. Robust and
          # reproducible — proot-distro moved its release hosting, so we no longer
          # depend on it. create+export never executes the image, so no QEMU needed.
          docker pull --platform linux/arm64 debian:bookworm-slim
          cid=$(docker create --platform linux/arm64 debian:bookworm-slim)
          docker export "$cid" | xz -T0 -c > "$dest/rootfs.tar.xz"
          docker rm "$cid"
          ls -lh "$dest"

      # --- optional signing keystore ----------------------------------------
      - name: Decode signing keystore
        if: ${{ inputs.sign }}
        env:
          AUREX_KEYSTORE_BASE64: ${{ secrets.AUREX_KEYSTORE_BASE64 }}
        run: |
          echo "$AUREX_KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.keystore"
          echo "AUREX_KEYSTORE_FILE=$RUNNER_TEMP/release.keystore" >> "$GITHUB_ENV"

      - name: Build release APK
        env:
          AUREX_KEYSTORE_PASSWORD: ${{ secrets.AUREX_KEYSTORE_PASSWORD }}
          AUREX_KEY_ALIAS: ${{ secrets.AUREX_KEY_ALIAS }}
          AUREX_KEY_PASSWORD: ${{ secrets.AUREX_KEY_PASSWORD }}
        run: |
          chmod +x ./gradlew || true
          ./gradlew :app:assembleRelease --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: aurex-term-release
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: error
          retention-days: 14
